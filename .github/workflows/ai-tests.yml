name: AI Agentic Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      test_goal:
        description: "Natural language test goal for the agent"
        required: false
        default: "Run full regression suite"

jobs:
  ai-agent-tests:
    name: Agentic E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run AI agent tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_ENV: ci
        run: npm run test:agent

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-reports-${{ github.run_number }}
          path: |
            reports/
            generated-tests/
          retention-days: 30

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: reports/*.png

  api-test-generation:
    name: AI-Generated API Tests
    runs-on: ubuntu-latest
    needs: ai-agent-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run AI-generated API tests
        run: npx playwright test tests/api/generated/ --reporter=list


  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [ai-agent-tests, api-test-generation]
    if: always()

    steps:
      - name: Report summary
        run: |
          echo "## AI Testing Agent Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Agentic E2E | ${{ needs.ai-agent-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AI API Generation | ${{ needs.api-test-generation.result }} |" >> $GITHUB_STEP_SUMMARY
